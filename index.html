<!DOCTYPE html>
<html lang="es">
<head>
    <title>Auditoría Solar AR</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #222; color: white; }
        model-viewer { width: 100%; height: 75vh; background-color: #333; }
        .info-panel { padding: 15px; text-align: center; background: #111; border-top: 2px solid #fbbf24; }
        button { 
            padding: 12px 24px; 
            background: #fbbf24; 
            color: black; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/SolarPanel/glTF-Binary/SolarPanel.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate
        shadow-intensity="1">
        
        <button slot="ar-button" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">
            ☀️ COLOCAR PANEL EN TEJADO
        </button>
    </model-viewer>

    <div class="info-panel">
        <h2 style="margin: 0 0 10px 0;">Auditoría AR</h2>
        <div id="status">Buscando superficie...</div>
        <p style="font-size: 12px; color: #888;">Usa Chrome en Android o Safari en iOS</p>
    </div>

</body>
</html>
