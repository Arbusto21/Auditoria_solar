<!DOCTYPE html>
<html lang="es">
<head>
    <title>Auditoría Solar AR</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; --poster-color: transparent; }
        .interface {
            position: absolute; bottom: 0; width: 100%; padding: 20px;
            background: rgba(0,0,0,0.8); text-align: center; box-sizing: border-box;
        }
        #ar-button {
            background: #fbbf24; border-radius: 30px; border: none;
            padding: 15px 30px; font-weight: bold; color: #000;
        }
        #progress-bar { width: 100%; height: 5px; background: #444; position: absolute; top: 0; left: 0; }
        #update-bar { width: 0%; height: 100%; background: #fbbf24; transition: width 0.3s; }
    </style>
</head>
<body>

    <model-viewer 
        src="https://modelviewer.dev/shared-assets/models/nefertiti.glb"
        camera-controls touch-action="pan-y"
        shadow-intensity="1" 
        alt="Panel Solar 3D">
        
        <div id="progress-bar" slot="progress-bar"><div id="update-bar"></div></div>
        
        <button slot="ar-button" id="ar-button">
            🚀 ACTIVAR CÁMARA (AR)
        </button>

        <div class="interface">
            <h3 style="margin:0">Auditoría Solar V1.0</h3>
            <p id="instrucciones">Si ves el fondo gris, espera a que cargue el modelo...</p>
        </div>
    </model-viewer>

    <script>
        // Lógica para la barra de carga
        const modelViewer = document.querySelector('model-viewer');
        modelViewer.addEventListener('progress', (event) => {
            const progress = event.detail.totalProgress * 100;
            document.getElementById('update-bar').style.width = `${progress}%`;
            if(progress === 100) {
                document.getElementById('instrucciones').innerText = "¡Listo! Pulsa el botón amarillo";
            }
        });
    </script>
</body>
</html>
